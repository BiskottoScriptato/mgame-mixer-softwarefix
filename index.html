    <style>
        body {
            background-color: #0f0f11;
            color: #eee;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
            margin: 0;
        }

        h1,
        h2 {
            color: #00e5ff;
            text-align: center;
            margin-top: 0;
        }

        h3 {
            color: #aaa;
            text-align: left;
            border-bottom: 1px solid #444;
            padding-bottom: 5px;
            margin-top: 20px;
            font-size: 1.1em;
        }

        .mixer-board {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto 40px auto;
            align-items: start;
        }

        .column {
            background: #1a1a1e;
            border: 1px solid #333;
            border-radius: 10px;
            padding: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
        }

        .card {
            background: #222226;
            border: 1px solid #444;
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 12px;
        }

        .card label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
            color: #ccc;
            font-size: 0.9em;
        }

        input,
        select,
        button {
            width: 100%;
            box-sizing: border-box;
            padding: 8px;
            margin-bottom: 8px;
            background: #111;
            color: white;
            border: 1px solid #444;
            border-radius: 4px;
        }

        button {
            background: #00e5ff;
            color: #000;
            font-weight: bold;
            cursor: pointer;
            border: none;
            transition: 0.2s;
        }

        button:hover {
            background: #00b3cc;
        }

        .row {
            display: flex;
            gap: 5px;
        }

        .dynamic-box {
            background: #1b1b1e;
            padding: 10px;
            border-radius: 4px;
            border: 1px dashed #555;
        }

        .side-panel {
            position: fixed;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            background: #1a1a1e;
            border: 1px solid #333;
            border-right: none;
            border-radius: 10px 0 0 10px;
            padding: 20px;
            box-shadow: -4px 4px 20px rgba(0, 0, 0, 0.7);
            width: 220px;
            z-index: 1000;
        }

        input[type="range"] {
            width: 100%;
            accent-color: #00e5ff;
            cursor: pointer;
        }

        .val-label {
            display: block;
            text-align: right;
            font-family: monospace;
            color: #00e5ff;
            font-weight: bold;
            margin-top: -5px;
            font-size: 1.1em;
        }
    </style>
</head>

        function updateTranslations() {
            const lang = currentLang;
            const t = translations[lang];
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (t[key]) {
                    el.textContent = t[key];
                }
            });
        }

        function changeLanguage(lang) {
            currentLang = lang;
            localStorage.setItem('mgame_lang', lang);
            updateTranslations();

            // Update active dropdown text if customized
            document.querySelectorAll('.custom-select-wrapper select').forEach(sel => {
                sel.dispatchEvent(new Event('change', { bubbles: true }));
            });
        }

        function toggleSettingsModal() {
            const modal = document.getElementById('settingsModal');
            modal.classList.toggle('open');

        // Check saved language on load
        document.addEventListener('DOMContentLoaded', () => {

            if (savedLang && translations[savedLang]) {
                currentLang = savedLang;
                document.getElementById('langSelect').value = savedLang;
            }
            updateTranslations();
        });

            let wrapS = document.getElementById('wrap_single_' + inputId);
            let wrapM = document.getElementById('wrap_multi_' + inputId);
            let hidden = document.getElementById(inputId);
            if (chk.checked) {
                wrapS.style.display = 'none';
                wrapM.style.display = 'flex';
                let val = hidden.value.split(',')[0] || 0;
                hidden.value = [val, val, val, val, val, val, val, val, val, val].join(',');
                for (let i = 0; i < 10; i++) {
                    let b = document.getElementById(`btn_${inputId}_${i}`);
                    if (b) b.style.background = M_COLORS[parseInt(val)];
                }
            } else {
                wrapS.style.display = 'flex';
                wrapM.style.display = 'none';
                let val = hidden.value.split(',')[0] || 0;
                hidden.value = val.toString();
                let btn = document.getElementById(`btn_single_${inputId}`);
                if (btn) btn.style.background = M_COLORS[parseInt(val)];
            }

        function openColorGrid(inputId, subIndex, length) {
            activeColorInputId = inputId;
            activeColorIndex = subIndex;
            activeLength = length;
            let modal = document.getElementById('color-grid-modal');
            if (!modal) return;
            modal.style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function chiudiColorGrid() {
            let modal = document.getElementById('color-grid-modal');
            if (modal) modal.style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        function assegnaColore(numero) {
            if (!activeColorInputId) return;
            let inputEl = document.getElementById(activeColorInputId);
            if (!inputEl) return;

            if (activeLength === 1) {
                inputEl.value = numero.toString();

                let btn = document.getElementById(`btn_${activeColorInputId}`);
                if (!btn) btn = document.getElementById(`btn_single_${activeColorInputId}`);
                if (btn) btn.style.background = M_COLORS[numero];
            } else {
                let valString = inputEl.value;
                let arr = valString ? valString.split(',').map(s => s.trim()) : [];
                while (arr.length < activeLength) arr.push('0');

                arr[activeColorIndex] = numero.toString();
                inputEl.value = arr.join(',');

                let btn_m = document.getElementById(`btn_${activeColorInputId}_${activeColorIndex}`);
                if (btn_m) btn_m.style.background = M_COLORS[numero];
            }
            chiudiColorGrid();
            inputEl.dispatchEvent(new Event('change', { bubbles: true }));
        }

    </script>

        function inv(nome_funzione, args_array) {
            fetch('/api/comando', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ funzione: nome_funzione, args: args_array })
            }).then(r => r.json()).then(res => {
                if (res.status === 'errore') alert("Errore dal Server: " + res.msg);
                else console.log(res.msg);
            }).catch(console.error);
        }

        function _applyIndicator(modeId, prefix, targetId) {
            const mode = document.getElementById(modeId).value;

            let cols = [0], bg = 0, peak = 0, isHigh = true;
            let c1 = 0, c2 = 0, is_fader = true;

            if (document.getElementById(prefix + 'cols')) {
                let v = document.getElementById(prefix + 'cols').value;
                if (v) cols = v.split(',').map(s => parseInt(s.trim())).filter(n => !isNaN(n));
                if (cols.length === 0) cols = [0];
            }
            if (document.getElementById(prefix + 'bg') && document.getElementById(prefix + 'bg').value !== "") {
                bg = parseInt(document.getElementById(prefix + 'bg').value);
            }
            if (document.getElementById(prefix + 'peak') && document.getElementById(prefix + 'peak').value !== "") {
                peak = parseInt(document.getElementById(prefix + 'peak').value);
            }
            if (document.getElementById(prefix + 'lum')) {
                isHigh = (document.getElementById(prefix + 'lum').value === 'true');
            }
            if (document.getElementById(prefix + 'c1') && document.getElementById(prefix + 'c1').value !== "") {
                c1 = parseInt(document.getElementById(prefix + 'c1').value);
            }
            if (document.getElementById(prefix + 'c2') && document.getElementById(prefix + 'c2').value !== "") {
                c2 = parseInt(document.getElementById(prefix + 'c2').value);
            }
            if (document.getElementById(prefix + 'is_fader')) {
                is_fader = document.getElementById(prefix + 'is_fader').checked;
            }

            // Inoltro Comandi Definitivo con passaggio di targetId
            if (mode === 'solid') {
                if (cols.length === 10) inv('imposta_mic_indicator_custom', [cols, targetId]);
                else inv('imposta_mic_indicator_solid', [cols[0], targetId]);
            }
            else if (mode === 'pulse') inv('imposta_mic_indicator_pulse', [cols, targetId]);
            else if (mode === 'chasing') inv('imposta_mic_indicator_chasing', [cols, targetId]);
            else if (mode === 'rainbow') inv('imposta_mic_indicator_rainbow', [isHigh, targetId]);
            else if (mode === 'fader') inv('imposta_mic_indicator_fader', [cols, peak, bg, targetId]);
            else if (mode === 'dynamic_gradient') inv('imposta_mic_indicator_dynamic_gradient', [c1, c2, is_fader, peak, bg, targetId]);
            else if (mode === 'pulse_fader') inv('imposta_mic_indicator_pulse_fader', [cols, peak, bg, targetId]);
            else if (mode === 'chasing_fader') inv('imposta_mic_indicator_chasing_fader', [cols, peak, bg, targetId]);
            else if (mode === 'rainbow_fader') inv('imposta_mic_indicator_rainbow_fader', [isHigh, targetId]);
            else if (mode === 'vu') inv('imposta_mic_indicator_vu_meter', [cols, peak, targetId]);
        }

            // Se l'utente muove manualmente lo slider o imposta un valore testuale,
            // forziamo l'accensione del Noise Gate e inviamo il valore.
            document.getElementById('gate_on_off').checked = true;
            inv('imposta_noise_gate', [parseInt(val)]);
        }

        function makeEverythingRainbow() {
            if (!confirm("Sicuro di voler attivare la modalità MEGA RAINBOW su tutto il mixer?")) return;

            // Imposta tutti i menu a tendina su 'rainbow' o 'rainbow_fader' se esiste l'opzione
            let selects = document.querySelectorAll('select');
            selects.forEach(sel => {
                if (sel.id.endsWith('_mode')) {
                    let opts = Array.from(sel.options);
                    let rbOpt = opts.find(o => o.value === 'rainbow' || o.value === 'rainbow_fader');
                    if (rbOpt) {
                        sel.value = rbOpt.value;
                        // Forza l'aggiornamento della Custom Select e delle UI dinamicamente
                        sel.dispatchEvent(new Event('change', { bubbles: true }));
                    }
                }
            });

            // Prepara l'elenco di tutte le funzioni di applicazione
            let funcs = [
                () => { if (typeof applyTxtMic === 'function') applyTxtMic(); },
                () => { if (typeof applyLogoAudio === 'function') applyLogoAudio(); },
                () => { if (typeof applyMuteMic === 'function') applyMuteMic(); },
                () => { if (typeof applyCensura === 'function') applyCensura(); },
                () => { if (typeof applyMicIndicator === 'function') applyMicIndicator(); },
                () => { if (typeof applyStrip === 'function') { applyStrip('sx'); applyStrip('dx'); } },
                () => { if (typeof applyVfx1 === 'function') applyVfx1(); },
                () => { if (typeof applyVfx2 === 'function') applyVfx2(); },
                () => { if (typeof applyLogo === 'function') applyLogo(); },
                () => { if (typeof applyKnobIndicator === 'function') applyKnobIndicator(); },
                () => { if (typeof applyBank === 'function') applyBank(); },
                () => { if (typeof applyContent === 'function') applyContent(); },
                () => {
                    if (typeof applyIcon === 'function') {
                        applyIcon('game', 29, 'Icona Game');
                        applyIcon('chat', 30, 'Icona Chat');
                        applyIcon('samp', 31, 'Icona Samp');
                        applyIcon('sys', 32, 'Icona Sys');
                    }
                }
            ];

            // Sampler
            for (let i = 1; i <= 5; i++) {
                funcs.push(() => { if (typeof applySamp === 'function') applySamp(i); });
            }

            // Fader (Extra Indicators)
            for (let i = 1; i <= 4; i++) {
                funcs.push(() => {
                    let targetSel = document.getElementById('e_target');
                    if (targetSel && typeof applyExtraIndicator === 'function') {
                        targetSel.value = i;
                        applyExtraIndicator();
                    }
                });
            }

            // Mute Sliders
            for (let i = 1; i <= 4; i++) {
                funcs.push(() => {
                    let mslSel = document.getElementById('msl_idx');
                    if (mslSel && typeof applyMuteSlider === 'function') {
                        mslSel.value = i;
                        applyMuteSlider();
                    }
                });
            }

            // Bank Numbers
            for (let i = 23; i <= 24; i++) {
                funcs.push(() => {
                    let nbnkSel = document.getElementById('nbnk_idx');
                    if (nbnkSel && typeof applyNumBank === 'function') {
                        nbnkSel.value = i;
                        applyNumBank();
                    }
                });
            }

            // Esegue i comandi sequenzialmente con 150ms di latenza per non sovraccaricare l'UDP
            let delay = 0;
            funcs.forEach(f => {
                setTimeout(f, delay);
                delay += 150;
            });
        }
